services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always

    env_file:
      - .env

    environment:
      - POSTGRES_USER=${PSQL_USER}
      - POSTGRES_PASSWORD=${PSQL_PASSWORD}
      - POSTGRES_DB=${PSQL_DB}

    ports:
      - "5432:5432"

    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
volumes:
  postgres_data: